<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Reset Password - SoftCrush</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121126;
      color: white;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 28px;
      text-align: center;
    }

    h1 {
      margin-bottom: 8px;
    }

    p {
      color: #c9c6d8;
      line-height: 1.5;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      margin-top: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff4f8b, #a855f7);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      margin-top: 16px;
      font-size: 14px;
      color: #c9c6d8;
      line-height: 1.4;
    }

    .success {
      color: #7ee787;
    }

    .error {
      color: #ff8a8a;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Reset your password</h1>
    <p>Enter a new password for your SoftCrush account.</p>

   <div id="passwordFields">
  <input id="password" type="password" placeholder="New password" autocomplete="new-password" />
  <input id="confirm" type="password" placeholder="Confirm password" autocomplete="new-password" />
</div>

    <button id="updateBtn" type="button" disabled>Update password</button>

<button id="openAppBtn" type="button" style="display: none;">
  Open SoftCrush app
</button>

<a id="downloadAppLink" href="https://softcrush.app" style="display: none;">
  Open SoftCrush website
</a>

<div id="message" class="message">Checking reset link...</div>
  </div>

  <script>
    (async function () {
      var SUPABASE_URL = "https://hxgkaefwzouxtbbcgakq.supabase.co";
      var SUPABASE_ANON_KEY = "sb_publishable_MJN3qyEsNQl6_N3b_BG_bw_IneydczQ";

      var sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      var message = document.getElementById("message");
      var updateBtn = document.getElementById("updateBtn");
      var passwordInput = document.getElementById("password");
      var confirmInput = document.getElementById("confirm");
      var openAppBtn = document.getElementById("openAppBtn");
      var passwordFields = document.getElementById("passwordFields");
      var downloadAppLink = document.getElementById("downloadAppLink");

        var sessionReady = false;
        
        function isMobileDevice() {
          return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        }

openAppBtn.addEventListener("click", function () {
  if (isMobileDevice()) {
    window.location.href = "softcrush://";
  } else {
    showMessage(
      "Password updated. Please open the SoftCrush app on your phone and sign in with your new password.",
      "success"
    );
  }
});

      function showMessage(text, type) {
        message.innerText = text;
        message.className = "message " + (type || "");
      }

      function getAllParams() {
        var hashString = window.location.hash ? window.location.hash.substring(1) : "";
        var queryString = window.location.search ? window.location.search.substring(1) : "";

        var hashParams = new URLSearchParams(hashString);
        var queryParams = new URLSearchParams(queryString);

        return {
          accessToken: hashParams.get("access_token") || queryParams.get("access_token"),
          refreshToken: hashParams.get("refresh_token") || queryParams.get("refresh_token"),
          code: queryParams.get("code") || hashParams.get("code"),
          errorCode: queryParams.get("error_code") || hashParams.get("error_code"),
          errorDescription: queryParams.get("error_description") || hashParams.get("error_description")
        };
      }

      async function setupSession() {
        try {
          var params = getAllParams();

          if (params.errorCode) {
            showMessage(
              decodeURIComponent(params.errorDescription || "This reset link is invalid or expired."),
              "error"
            );
            return;
          }

          if (params.code) {
            var exchangeResult = await sbClient.auth.exchangeCodeForSession(params.code);

            if (exchangeResult.error) {
              showMessage(exchangeResult.error.message, "error");
              return;
            }

            sessionReady = true;
            updateBtn.disabled = false;
            window.history.replaceState({}, document.title, "/reset-password.html");
            showMessage("Reset link verified. Enter your new password.", "success");
            return;
          }

          if (params.accessToken && params.refreshToken) {
            var sessionResult = await sbClient.auth.setSession({
              access_token: params.accessToken,
              refresh_token: params.refreshToken
            });

            if (sessionResult.error) {
              showMessage(sessionResult.error.message, "error");
              return;
            }

            sessionReady = true;
            updateBtn.disabled = false;
            window.history.replaceState({}, document.title, "/reset-password.html");
            showMessage("Reset link verified. Enter your new password.", "success");
            return;
          }

          showMessage("Invalid or expired reset link. Please request a new one.", "error");
        } catch (err) {
          showMessage(
            err && err.message ? err.message : "Something went wrong verifying the reset link.",
            "error"
          );
        }
      }

      async function handleResetPassword() {
        try {
          if (!sessionReady) {
            showMessage("Reset link is not ready. Please request a new reset email.", "error");
            return;
          }

          var password = passwordInput.value;
          var confirm = confirmInput.value;

          if (password.length < 6) {
            showMessage("Password must be at least 6 characters.", "error");
            return;
          }

          if (password !== confirm) {
            showMessage("Passwords do not match.", "error");
            return;
          }

          updateBtn.disabled = true;
          updateBtn.innerText = "Updating...";

          var updateResult = await sbClient.auth.updateUser({
            password: password
          });

          if (updateResult.error) {
            showMessage(updateResult.error.message, "error");
            updateBtn.disabled = false;
            updateBtn.innerText = "Update password";
            return;
          }

          await sbClient.auth.signOut();

          passwordFields.style.display = "none";
          updateBtn.style.display = "none";
          
          showMessage(
            isMobileDevice()
              ? "Password updated successfully. You can now open SoftCrush and sign in with your new password."
              : "Password updated successfully. Open SoftCrush on your phone and sign in with your new password.",
            "success"
          );
          
          if (isMobileDevice()) {
            openAppBtn.style.display = "block";
          }
        } catch (err) {
          showMessage(
            err && err.message ? err.message : "Could not update password.",
            "error"
          );
          updateBtn.disabled = false;
          updateBtn.innerText = "Update password";
        }
      }

      updateBtn.addEventListener("click", handleResetPassword);

      await setupSession();
    })();
  </script>
</body>
</html>
