<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Reset Password - SoftCrush</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121126;
      color: white;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 28px;
      text-align: center;
    }

    h1 {
      margin-bottom: 8px;
    }

    p {
      color: #c9c6d8;
      line-height: 1.5;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      margin-top: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff4f8b, #a855f7);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .message {
      margin-top: 16px;
      font-size: 14px;
      color: #c9c6d8;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Reset your password</h1>
    <p>Enter a new password for your SoftCrush account.</p>

    <input id="password" type="password" placeholder="New password" />
    <input id="confirm" type="password" placeholder="Confirm password" />

    <button onclick="resetPassword()">Update password</button>

    <div id="message" class="message"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://hxgkaefwzouxtbbcgakq.supabase.co"
    const SUPABASE_ANON_KEY = "sb_publishable_MJN3qyEsNQl6_N3b_BG_bw_IneydczQ"

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    function getHashParams() {
      const hash = window.location.hash.substring(1)
      return new URLSearchParams(hash)
    }

    async function setupSession() {
      const params = getHashParams()

      const access_token = params.get("access_token")
      const refresh_token = params.get("refresh_token")

      if (!access_token || !refresh_token) {
        document.getElementById("message").innerText =
          "Invalid or expired reset link. Please request a new one."
        return
      }

      const { error } = await supabase.auth.setSession({
        access_token,
        refresh_token,
      })

      if (error) {
        document.getElementById("message").innerText =
          "Invalid or expired reset link. Please request a new one."
      }
    }

    async function resetPassword() {
      const password = document.getElementById("password").value
      const confirm = document.getElementById("confirm").value
      const message = document.getElementById("message")

      if (password.length < 6) {
        message.innerText = "Password must be at least 6 characters."
        return
      }

      if (password !== confirm) {
        message.innerText = "Passwords do not match."
        return
      }

      const { error } = await supabase.auth.updateUser({
        password,
      })

      if (error) {
        message.innerText = error.message
        return
      }

      await supabase.auth.signOut()

      message.innerText = "Password updated. You can now sign in with your new password."
    }

    setupSession()
  </script>
</body>
</html>
