<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Reset Password - SoftCrush</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121126;
      color: white;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 28px;
      text-align: center;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      margin-top: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff4f8b, #a855f7);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      margin-top: 16px;
      font-size: 14px;
      color: #c9c6d8;
      line-height: 1.4;
    }

    .success {
      color: #7ee787;
    }

    .error {
      color: #ff8a8a;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Reset your password</h1>
    <p>Enter a new password for your SoftCrush account.</p>

    <input id="password" type="password" placeholder="New password" />
    <input id="confirm" type="password" placeholder="Confirm password" />

    <button id="updateBtn" type="button">Update password</button>

    <div id="message" class="message">Checking reset link...</div>
  </div>

  <script>
    const SUPABASE_URL = "https://hxgkaefwzouxtbbcgakq.supabase.co"
    const SUPABASE_ANON_KEY = "PASTE_YOUR_SB_PUBLISHABLE_KEY_HERE"

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    const message = document.getElementById("message")
    const updateBtn = document.getElementById("updateBtn")

    let sessionReady = false

    function showMessage(text, type) {
      message.innerText = text
      message.className = "message " + (type || "")
    }

    function getHashParams() {
      const hash = window.location.hash.substring(1)
      return new URLSearchParams(hash)
    }

    async function setupSession() {
      try {
        const params = getHashParams()

        const access_token = params.get("access_token")
        const refresh_token = params.get("refresh_token")
        const error_code = params.get("error_code")
        const error_description = params.get("error_description")

        if (error_code) {
          showMessage(error_description || "This reset link is invalid or expired.", "error")
          return
        }

        if (!access_token || !refresh_token) {
          showMessage("Invalid or expired reset link. Please request a new one.", "error")
          return
        }

        const { error } = await client.auth.setSession({
          access_token,
          refresh_token,
        })

        if (error) {
          showMessage(error.message, "error")
          return
        }

        sessionReady = true

        window.history.replaceState({}, document.title, "/reset-password.html")

        showMessage("Reset link verified. Enter your new password.", "success")
      } catch (err) {
        console.error(err)
        showMessage(err.message || "Something went wrong verifying the reset link.", "error")
      }
    }

    async function resetPassword() {
      try {
        if (!sessionReady) {
          showMessage("Reset link is not ready. Please request a new reset email.", "error")
          return
        }

        const password = document.getElementById("password").value
        const confirm = document.getElementById("confirm").value

        if (password.length < 6) {
          showMessage("Password must be at least 6 characters.", "error")
          return
        }

        if (password !== confirm) {
          showMessage("Passwords do not match.", "error")
          return
        }

        updateBtn.disabled = true
        updateBtn.innerText = "Updating..."

        const { error } = await client.auth.updateUser({
          password: password,
        })

        if (error) {
          showMessage(error.message, "error")
          updateBtn.disabled = false
          updateBtn.innerText = "Update password"
          return
        }

        await client.auth.signOut()

        showMessage("Password updated successfully. You can now sign in with your new password.", "success")
        updateBtn.innerText = "Password updated"
      } catch (err) {
        console.error(err)
        showMessage(err.message || "Could not update password.", "error")
        updateBtn.disabled = false
        updateBtn.innerText = "Update password"
      }
    }

    updateBtn.addEventListener("click", resetPassword)

    setupSession()
  </script>
</body>
</html>
